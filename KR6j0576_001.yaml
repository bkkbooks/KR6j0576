body:
  text: 唐三藏法師提雲般若等奉制譯如是我聞一時佛在恆伽河邊護世四天王之所圍繞爾時世尊告毗沙門等四天王言汝等當知一切衆生若男若女若長若幼皆為四種大怖所纏謂生老病死然於其中死怖一種最難除遣我今為汝説除遣法爾時四天王即從座起合掌恭敬白佛言世尊我等今者獲大善利得值如來攝受世間施其命故爾時世尊從座而起面于東方彈指唱言彼方所有諸佛如來應正等覺莫不皆為一切衆生而成阿耨多羅三藐三菩提諸佛當知我今為欲哀愍救護諸衆生故轉先未轉第二法輪當令衆生色力壽命皆悉增長永復無有非時夭橫唯願諸佛來此會中為護衆生共以威神除其橫苦南西北方四維上下皆亦如是是時如來以佛眼觀十方世界一一世界皆有諸佛側塞充滿猶如稻麻悉來此會而為等侶然見十方一切世界一一方處諸佛世尊亦皆遍滿分明顯現如是一切諸佛如來俱時發聲而説呪曰折禮句一折羅折禮句二毗那去借音即此字之上聲下有字傍注上字皆倣此徵珍里反句三莎蘇括反悉底都以反下同雞句四斫迦爛揭時句五鉢羅舍漫都句六薩婆嚕依魯字本音而轉舌呼之其下口邊作犁羅麗皆倣此伽句七阿那上𪘜卓諧反句八俱那上𪘜句九摩訶捺𪘜句十折𠼐折𠼐句十一醯呼計反下同摩具𠼝句十二醯摩儞産去地句十三醯摩室尼句十四吉囉上陛句十五吉囉上鞞句十六醯引聲俱囉上𠼐句十七俱囉上𠼐句十八俱末底句十九毗奢麼謀跛反泥句二十戍暑輸矩反毗上婆句二十一阿折禮毗折禮句二十二摩毗上濫婆句二十三呼去牟呼去牟句二十四爾時十方諸佛一一皆有金剛密迹王親近圍繞此無量金剛王衆復共同聲而説呪曰賧呼濫反引聲句一賧句二室勢句三颯婆去訶句四爾時毗沙門天王白佛言世尊我今亦為擁護衆生説陀羅尼令其無有非時夭橫唯願如來垂哀與力即説呪曰稅低句一稅怛犁句二履梨句三爾時毗盧勒叉天王亦作是言我今為欲護諸衆生説陀羅尼即説呪曰摩蹬耆瞿雞反句一摩蹬耆祇里反尼儞咨反句二暑輸矩反下同摩暑母句三爾時提頭賴吒天王亦為擁護諸衆生故而説呪曰折囇折囇颯婆去訶爾時毗樓博叉天王亦説呪曰跋凌去婆上婆爾時世尊告四天王言諸天等此陀羅尼從於一切諸佛所生一切諸佛共所知見若善男子善女人乃至有能一日之中讀一遍者是人終不墮於惡趣當於是人起大師想若有人為欲利益一切衆生於日日中讀誦斯呪能令衆生壽命增長亦令其人災橫怖畏皆得消除無諸惡相及衆疾苦水不能漂火不能燒刀不能傷毒不能害若在在處處有能讀誦此陀羅尼當知此處則為十方一切諸佛常所護念若人自書若教人書其人則為承事供養一切諸佛何以故若於衆生能作饒益則為供養一切佛故若有專欲擁護其身當書此呪佩著身上若所在之處有深信法善男子善女人等或遇災難欲令除滅疾應如法受持此呪持呪法著先當簡擇清淨之處以栴檀末而塗其地成一方壇縱廣七肘其人應從月初八日香湯洗浴著新淨衣受八戒齋唯食粳米石蜜牛乳取黑沈香及龍腦香共滿一兩置於壇上又取白檀香或沈水香或龍腦香或復丁香迦矩羅香而置於壇其人誦此陀羅尼呪呪此諸香於日日中皆七七遍滿于七日至十五日一日不食其日中時以鬱金香於其壇上作二十一小壇其一處中名如來壇餘二十壇名金剛王壇又於壇外作四小壇名四天王壇復取麝香龍腦白檀鬱金之香及紫檀末於如來壇若散若塗而為供養自餘諸壇隨取一香而供養之又取乳酪酥及沙糖如其次第以新瓶四口各別盛之置四天王壇上又以淨水著於瓶內採十二種果樹之花而置其中又以香油然十支燈置如來壇為欲供養十方佛故自餘諸壇各然一支於前所呪諸香之內取龍腦及沈水於如來壇而燒供養其餘壇上然自餘香將然香時其如來壇及餘壇香復應各別誦此神呪而以呪之若有衆生得聞此香非時夭橫靡不除滅先所呪香並燒盡已然後收彼四天王食散於淨處佛説此經已四大天王及一切世間天人阿修羅乾闥婆等歡喜奉行
